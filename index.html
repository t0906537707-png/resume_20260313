<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>周庭聿 個人履歷</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 850px;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            animation: fadeIn 0.8s;
        }

        /* 頂部深藍色區塊 (模仿你截圖的風格) */
        .header-banner {
            background-color: #003d5b; /* 深藍色 */
            color: white;
            padding: 40px;
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .profile-pic {
            width: 180px;
            height: 180px;
            object-fit: cover;
            border: 4px solid #3498db;
            border-radius: 10px; /* 稍微圓角，或改 50% 變圓形 */
        }

        .header-text h1 {
            font-size: 48px;
            margin: 0;
        }

        .tag {
            background: #b2ebf2;
            color: #006064;
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 10px;
            font-weight: bold;
        }

        /* 下方內容區 */
        .content {
            padding: 40px;
        }

        .section-title {
            color: #003d5b;
            font-size: 24px;
            border-bottom: 2px solid #003d5b;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .experience-item {
            margin-bottom: 30px;
            display: flex;
            gap: 20px;
        }

        .year {
            font-weight: bold;
            color: #555;
            min-width: 80px;
        }

        .info h3 { margin: 0; color: #333; }
        .info p { color: #666; line-height: 1.6; }

        button {
            background: #003d5b;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-banner">
        <img src="images/1000036753.jpg" alt="我的個人照" class="profile-pic">
        <div class="header-text">
            <h1>周庭聿</h1>
            <div class="tag">室內設計系學生</div>
            <div class="tag" style="background:#e0f7fa;">學號：AU114055009</div>
        </div>
    </div>

    <div class="content">
        <div class="section-title">Education & Experience</div>

        <div class="experience-item">
            <div class="year">2026</div>
            <div class="info">
                <h3>亞洲大學 室內設計學系</h3>
                <p>目前在學中。專注於空間規劃、AutoCAD 電腦繪圖以及設計概念發想。</p>
                <div id="more" style="display:none;">
                    我對於室內設計充滿熱情，喜歡透過手繪與練習來培養創作能力，期望未來能創造更美觀的生活空間。
                </div>
                <button onclick="showMore()">顯示更多</button>
            </div>
        </div>

        <div class="section-title">Skills</div>
        <div class="experience-item">
            <div class="year">技能清單</div>
            <div class="info">
                <p>AutoCAD 電腦繪圖 / 空間規劃設計 / 手繪設計草圖 / 室內設計基本概念</p>
            </div>
        </div>
    </div>
</div>

<script>
function showMore() {
    var x = document.getElementById("more");
    if (x.style.display === "none") {
        x.style.display = "block";
        event.target.innerHTML = "隱藏內容";
    } else {
        x.style.display = "none";
        event.target.innerHTML = "顯示更多";
    }
}
</script>

</body>
</html>
